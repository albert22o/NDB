{% extends "base.html" %}

{% block content %}
    <h2>Добавить новый объект на продажу</h2>
    <form method="POST">
        <div class="form-group">
            <label>Район:</label>
            <input type="text" name="district" required>
        </div>
        <div class="form-group">
            <label>Адрес:</label>
            <input type="text" name="address" required>
        </div>
        <div class="form-group">
            <label>Площадь (кв.м):</label>
            <input type="number" step="0.01" name="area" required>
        </div>
        <div class="form-group">
            <label>Цена:</label>
            <input type="number" step="0.01" name="price" required>
        <div class="form-group">
            <label>Продавец:</label>
            <select name="seller_id" required>
                <option value="" disabled selected>Выберите продавца</option>
                {% for seller in sellers %}
                    <option value="{{ seller.seller_id }}">{{ seller.full_name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Добавить объект</button>
    </form>
{% endblock %}
