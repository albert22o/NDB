version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       realty_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB:   realty_db
      POSTGRES_USER: postgres
      POSTGRES_PASS: postgres
      MONGO_URI:     mongodb://mongo:27017/
      MONGO_DB:      realty_mongo
      REDIS_HOST:    redis
      REDIS_PORT:    "6379"
    depends_on:
      - postgres
      - mongo
      - redis
    command: python app.py

volumes:
  pg_data:
  mongo_data:
