<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AutoMarket{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --card:      #22263a;
      --border:    #2e3352;
      --accent:    #4f6ef7;
      --accent-h:  #6b85ff;
      --danger:    #e05252;
      --success:   #3db87a;
      --warning:   #e0a952;
      --text:      #e2e6f3;
      --muted:     #8a90ad;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .5px;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
      transition: color .2s;
    }
    nav a:hover { color: var(--text); }
    nav .nav-right { margin-left: auto; }
    nav .btn-nav {
      background: var(--accent);
      color: #fff !important;
      padding: .4rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: .85rem;
      transition: background .2s;
    }
    nav .btn-nav:hover { background: var(--accent-h); }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; }
    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem; }

    /* ── Alerts ── */
    .alerts { margin-bottom: 1.5rem; }
    .alert {
      padding: .75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: .5rem;
      font-size: .9rem;
      border-left: 4px solid;
    }
    .alert-success { background: #1b3d2e; border-color: var(--success); color: #7fe0ae; }
    .alert-danger  { background: #3d1b1b; border-color: var(--danger);  color: #f09090; }
    .alert-warning { background: #3d2e1b; border-color: var(--warning); color: #f0c080; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: .55rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary   { background: var(--accent);  color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--border); }

    /* ── Forms ── */
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: .35rem; }
    input[type=text], input[type=number], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .6rem .85rem;
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: var(--surface); }

    /* ── Stars ── */
    .stars { color: #f5c518; letter-spacing: 2px; font-size: 1rem; }
    .stars.small { font-size: .8rem; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
    }
    .badge-blue    { background: #1e2d6b; color: #7ea4ff; }
    .badge-green   { background: #1b3d2e; color: #7fe0ae; }
    .badge-red     { background: #3d1b1b; color: #f09090; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.03); }

    /* ── Muted text ── */
    .muted { color: var(--muted); font-size: .9rem; }

    /* ── Divider ── */
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  </style>
</head>
<body>

<nav>
  <a href="{{ url_for('index') }}" class="logo">🚗 AutoMarket</a>
  <a href="{{ url_for('index') }}">Каталог</a>
  <a href="{{ url_for('search') }}">Поиск</a>
  <div class="nav-right">
    <a href="{{ url_for('car_new') }}" class="btn-nav">+ Добавить авто</a>
  </div>
</nav>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="alerts">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
